name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/artigianofast_shop
            git pull
            npm install
            npm run build
            pm2 restart shop-backend shop-frontend || (pm2 start npm --name "shop-backend" -- start && pm2 start npm --name "shop-frontend" -- run preview -- --port 4175)
            pm2 save
```

